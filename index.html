<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/login.css" />
  </head>

  <body>
    <!-- Header -->
    <header>
      <div class="header-left">
        <img
          src="./images/logo-transparent.png"
          alt="Saurabh E-Commerce Admin Panel Logo"
          class="site-logo"
        />
        <span class="site-name">
          <span class="site-name-main">Saurabh E-Commerce</span>
          <span class="site-name-sub">Admin</span>
        </span>
      </div>
    </header>

    <!-- Login Form -->
    <main>
      <section class="login-container">
        <h1>Login</h1>
        <form id="login-form">
          <label for="username">Username/Email/Mobile No:</label>
          <input type="text" id="username" name="username" required />

          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required />

          <button type="submit" id="login-button">Login</button>
          <p id="loading-message" style="display: none; color: blue">
            Logging in...
          </p>
        </form>

        <p id="login-message" class="login-message"></p>
        <p class="signup-link">
          Don't have an account? <a href="signup.html">Sign up</a>
        </p>
      </section>
    </main>

    <!-- Footer -->
    <footer>
      <p>
        Designed & managed by:<a
          href="https://www.gu-saurabh.tech/"
          target="_blank"
          class="footer-link"
        >
          Saurabh Kumar</a
        >. &copy; 2025 - All rights reserved.
      </p>
    </footer>

    <script>
      document
        .getElementById("login-form")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const input = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const scriptURL =
            "https://script.google.com/macros/s/AKfycbymrFvsxipkhi98x_Y0dIYpE5Tr4-XU90vEEMvOOlM9u531TrKeepqmOj9YIIIq21cC/exec";

          try {
            const response = await fetch(scriptURL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ input, password }),
            });

            if (!response.ok) {
              throw new Error(`HTTP error! Status: ${response.status}`);
            }

            const result = await response.json();
            console.log("API Response:", result); // Debugging log

            const messageElement = document.getElementById("login-message");

            if (result.success) {
              messageElement.textContent = "Login successful!";
              messageElement.style.color = "green";
              setTimeout(() => (window.location.href = "dashboard.html"), 1000);
            } else {
              messageElement.textContent =
                "Invalid credentials. Please try again.";
              messageElement.style.color = "red";
            }
          } catch (error) {
            console.error("Fetch Error:", error); // Log error for debugging
            document.getElementById("login-message").textContent =
              "An error occurred. Please try again later.";
            document.getElementById("login-message").style.color = "red";
          }
        });
    </script>
  </body>
</html>
