<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup Page</title>
    <link rel="stylesheet" href="./styles/styles.css" />
    <link rel="stylesheet" href="./styles/signup.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="header-left">
        <img
          src="./images/logo-transparent.png"
          alt="Saurabh E-Commerce Admin Panel Logo"
          class="site-logo"
        />
        <span class="site-name">
          <span class="site-name-main">Saurabh E-Commerce</span>
          <span class="site-name-sub">Admin</span>
        </span>
      </div>

      <div class="header-right">
        <a href="index.html" class="signup-btn">Sign in</a>
      </div>
    </header>

    <!-- Signup Form -->
    <main>
      <section class="signup-container">
        <h1>Signup</h1>
        <form id="signup-form">
          <input
            type="text"
            id="first-name"
            name="first-name"
            placeholder="First Name"
            required
          />

          <input
            type="text"
            id="last-name"
            name="last-name"
            placeholder="Last Name"
          />

          <input
            type="text"
            id="email-mobile"
            name="email-mobile"
            placeholder="Email or Mobile"
            required
          />

          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
            required
          />

          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />

          <button type="submit" id="signup-button">Sign up</button>
          <p class="signup-link">
            Already have account <a href="index.html">Log in</a>
          </p>
          <p id="loading-message" style="display: none; color: rgb(42, 210, 0)">
            Signing up...
          </p>
        </form>
      </section>
    </main>

    <button
      class="root"
      style="
        background-color: transparent;
        font-size: 16px;
        cursor: pointer;
      "
    >
      <a
        href="dashboard.html"
        style="color: rgb(205, 0, 0); text-decoration: none"
        >Root Login</a
      >
    </button>

    <!-- Footer -->
    <footer>
      <p>
        Designed & managed by:
        <a
          href="https://www.gu-saurabh.tech/"
          target="_blank"
          class="footer-link"
        >
          Saurabh Kumar </a
        >. &copy; 2025- All rights reserved.
      </p>
    </footer>

    <script>
      function togglePassword() {
        const passwordField = document.getElementById("password");
        passwordField.type =
          passwordField.type === "password" ? "text" : "password";
      }

      document
        .getElementById("signup-form")
        .addEventListener("submit", async function (event) {
          event.preventDefault(); // Prevent form from submitting normally

          // Collect form data
          const firstName = document.getElementById("first-name").value.trim();
          const lastName =
            document.getElementById("last-name").value.trim() || "";
          const emailMobile = document
            .getElementById("email-mobile")
            .value.trim();
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!firstName || !username || !password || !emailMobile) {
            alert("Please fill all required fields.");
            return;
          }

          // Determine if input is email or mobile
          const isEmail = emailMobile.includes("@");
          const email = isEmail ? emailMobile : "";
          const mobile = isEmail ? "" : emailMobile;

          // Prepare the data object
          const data = {
            firstName: firstName,
            lastName: lastName,
            email: email,
            mobile: mobile,
            username: username,
            password: password,
          };

          const url =
            "https://script.google.com/macros/s/AKfycbyGKH0TWMF97e7AtCNM0eOJwI9ljd-dZVHKF7FGQOlDYmIlUM4jlLR4bBBCPT953G93/exec";

          document.getElementById("loading-message").style.display = "block";

          try {
            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              mode: "no-cors",
              body: JSON.stringify(data),
            });

            const text = await response.text(); // Read raw text response

            console.log("Raw response from server:", text); // Debugging: Log response

            if (!text) throw new Error("Empty response from server!");

            const result = JSON.parse(text); // Convert raw text to JSON

            if (result.success) {
              alert(result.message);
              this.reset(); // Reset the form
            } else {
              throw new Error(result.message);
            }
          } catch (error) {
            console.error("Error saving data:", error);
            alert(`Failed to sign up. Error: ${error.message}`);
          } finally {
            document.getElementById("loading-message").style.display = "none";
          }
        });
    </script>
  </body>
</html>
